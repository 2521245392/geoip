name: Build geoip files
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 4"
  push:
    branches:
      - master
    paths-ignore:
      - ".gitignore"
      - "LICENSE*"
      - "*.md"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod

      - name: Set variables
        run: |
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "RELEASE_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
        shell: bash

      - name: Download GeoLite2 Databases
        env:
          LICENSE_KEY: ${{ secrets.MAXMIND_GEOLITE2_LICENSE }}
        run: |
          mkdir -p output
          
          # 下载 ASN 数据库
          curl -L "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-ASN&license_key=${LICENSE_KEY}&suffix=tar.gz" -o ./output/GeoLite2-ASN.tar.gz
          tar -xvzf ./output/GeoLite2-ASN.tar.gz -C ./output
          mv ./output/GeoLite2-ASN_*/GeoLite2-ASN.mmdb ./GeoLite2-ASN.mmdb
          cp ./GeoLite2-ASN.mmdb ./output/ASN.mmdb
          
          # 下载 Country 数据库供清洗使用
          curl -L "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-Country&license_key=${LICENSE_KEY}&suffix=tar.gz" -o ./output/GeoLite2-Country.tar.gz
          tar -xvzf ./output/GeoLite2-Country.tar.gz -C ./output
          mv ./output/GeoLite2-Country_*/GeoLite2-Country.mmdb ./GeoLite2-Country.mmdb

      - name: Download and deep clean ChinaMax IP CIDR
        run: |
          # 1. 拉取脏数据
          curl -sL "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ChinaIPs/ChinaIPs_IP.txt" > chinamax_cidr.txt
          
          # 2. 从你提供的 URL 拉取绝对白名单
          curl -sL "https://shijiu.cc.cd/source_unique_asns.txt" > source_unique_asns.txt
          
          # 3. 安装依赖并运行清洗脚本
          go get github.com/oschwald/geoip2-golang go4.org/netipx
          go run cleaner.go

          # 🔥🔥🔥 关键修复：过河拆桥！运行完立刻删掉清洗脚本，防止干扰后续编译 🔥🔥🔥
          rm cleaner.go
          
          # 4. 把国内纯净段喂给 config.json 指定的路径
          mkdir -p geolite2
          mv clean_cn_whitelisted.txt ./geolite2/chinamax_cidr.txt
          
          # 5. 保留出海白名单至 release
          mv overseas_but_whitelisted.txt ./output/ || true

          echo "Cleaned CIDR count:"
          wc -l ./geolite2/chinamax_cidr.txt
          test -s ./geolite2/chinamax_cidr.txt

      - name: Build Country.mmdb
        run: |
          # 原项目的打包核心命令保持不变
          go build ./
          ./geoip convert -c ./config.json

      - name: Clean output directory
        run: |
          cd ./output || exit 1
          find . -type f ! -name "ASN.mmdb" ! -name "Country.mmdb" ! -name "overseas_but_whitelisted.txt" -delete

      - name: Verify mmdb files
        run: |
          cd ./output || exit 1
          go install -v github.com/maxmind/mmdbverify@latest
          for name in $(ls *.mmdb); do
            $(go env GOPATH)/bin/mmdbverify -file ${name}
          done

      - name: Generate sha256 checksum
        run: |
          cd ./output || exit 1
          for name in $(ls *.mmdb); do
            sha256sum ${name} > ./${name}.sha256sum
          done

      - name: Git push assets to "release" branch
        run: |
          cd output || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add -A
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add geoip "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u geoip release

      - name: Purge jsdelivr CDN
        run: |
          cd output || exit 1
          for file in $(ls *.mmdb); do
            curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/${file}"
          done

      - name: Delete old releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 1
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload files to GitHub release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file_glob: true
          file: ./output/*
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}
          overwrite: true
